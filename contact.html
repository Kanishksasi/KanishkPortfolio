<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #f5f5f7;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .contact-wrapper {
            max-width: 600px;
            width: 100%;
        }

        .back-btn {
            background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
            color: #000;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 2rem;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            transform: translateX(-5px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.4);
        }

        h2 {
            font-size: 3rem;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #00d4ff;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.8rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 10px;
            color: #f5f5f7;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(0, 212, 255, 0.6);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .buttons-row {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .submit-btn,
        .cancel-btn {
            flex: 1;
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn {
            background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
            color: #000;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .cancel-btn {
            background: rgba(255, 255, 255, 0.05);
            color: #a1a1a6;
            border: 1px solid rgba(0, 212, 255, 0.2);
        }

        .cancel-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(0, 212, 255, 0.4);
        }

        /* Success Message Styles */
        .success-message {
            display: none;
            text-align: center;
            padding: 3rem 2rem;
        }

        .success-message.show {
            display: block;
            animation: slideInUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: scaleIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes scaleIn {
            from {
                transform: scale(0) rotate(-180deg);
                opacity: 0;
            }
            to {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        .success-message h2 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .success-message p {
            font-size: 1.1rem;
            color: #a1a1a6;
            margin-bottom: 2rem;
        }

        .redirect-timer {
            font-size: 0.95rem;
            color: #00d4ff;
            margin-top: 1rem;
        }

        .form-container {
            display: block;
        }

        .form-container.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="contact-wrapper">
        <!-- Form Container -->
        <div class="form-container" id="formContainer">
            <button class="back-btn" id="backBtn">← Back to Portfolio</button>
            <h2>Send Me a Message</h2>
            <form id="contactForm">
                <div class="form-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Your Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" required></textarea>
                </div>
                <div class="buttons-row">
                    <button type="submit" class="submit-btn" id="submitBtn">Send Message</button>
                    <button type="button" class="cancel-btn" id="cancelBtn">Cancel</button>
                </div>
            </form>
        </div>

        <!-- Success Message Container -->
        <div class="success-message" id="successMessage">
            <div class="success-icon">✓</div>
            <h2>Message Sent!</h2>
            <p>Thanks for reaching out! I'll get back to you as soon as possible.</p>
            <div class="redirect-timer">
                Redirecting to portfolio in <span id="countdown">2</span> seconds...
            </div>
        </div>
    </div>

    <script>
        const backBtn = document.getElementById('backBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const contactForm = document.getElementById('contactForm');
        const formContainer = document.getElementById('formContainer');
        const successMessage = document.getElementById('successMessage');
        const submitBtn = document.getElementById('submitBtn');
        const countdownEl = document.getElementById('countdown');

        function goBackToPortfolio() {
            window.location.href = 'index.html';
        }

        backBtn.addEventListener('click', goBackToPortfolio);
        cancelBtn.addEventListener('click', goBackToPortfolio);

        contactForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Disable submit button during submission
            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';

            const formData = new FormData(contactForm);

            try {
                // Send to Formspree using fetch (AJAX)
                const response = await fetch('https://formspree.io/f/mykeaywr', {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                if (response.ok) {
                    // Hide form, show success message
                    formContainer.classList.add('hidden');
                    successMessage.classList.add('show');

                    // Start countdown
                    let seconds = 2;
                    countdownEl.textContent = seconds;

                    const countdownInterval = setInterval(() => {
                        seconds--;
                        countdownEl.textContent = seconds;

                        if (seconds <= 0) {
                            clearInterval(countdownInterval);
                            goBackToPortfolio();
                        }
                    }, 1000);
                } else {
                    // Handle errors
                    alert('There was an issue sending your message. Please try again.');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Send Message';
                }
            } catch (error) {
                console.error('Error:', error);
                alert('There was an issue sending your message. Please try again.');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Message';
            }
        });
    </script>
</body>
</html>
